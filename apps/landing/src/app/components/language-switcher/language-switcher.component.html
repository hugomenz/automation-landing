<fieldset class="lang-switch">
  <legend class="visually-hidden">Language / Sprache</legend>
  <button
    type="button"
    class="lang-option"
    [class.is-active]="language() === 'de'"
    [attr.aria-pressed]="language() === 'de'"
    (click)="setLanguage('de')"
  >
    DE
  </button>
  <button
    type="button"
    class="lang-option"
    [class.is-active]="language() === 'en'"
    [attr.aria-pressed]="language() === 'en'"
    (click)="setLanguage('en')"
  >
    EN
  </button>
</fieldset>
