<figure class="wf">
  <figcaption class="wf-head">
    <span class="wf-dots" aria-hidden="true">
      <i></i><i></i><i></i>
    </span>
    <span class="wf-file mono">{{ diagram().fileLabel }}</span>
  </figcaption>

  <ol class="wf-flow">
    @for (node of diagram().nodes; track node.stage) {
      <li class="wf-node" [attr.data-kind]="node.kind">
        <span class="wf-icon" aria-hidden="true">
          @switch (node.kind) {
            @case ('input') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="3" width="14" height="18" rx="2" />
                <path d="M9 8h6M9 12h6M9 16h4" />
              </svg>
            }
            @case ('check') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3 5 6v5c0 4.5 3 7.5 7 9 4-1.5 7-4.5 7-9V6l-7-3z" />
                <path d="m9 11 2 2 4-4" />
              </svg>
            }
            @case ('action') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2 11 13" />
                <path d="M22 2 15 22l-4-9-9-4 20-7z" />
              </svg>
            }
            @case ('store') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="8" ry="3" />
                <path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5" />
                <path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />
              </svg>
            }
          }
        </span>

        <span class="wf-text">
          <span class="wf-stage mono">{{ node.stage }}</span>
          <span class="wf-label">{{ node.label }}</span>
        </span>
      </li>
    }
  </ol>

  <div class="wf-foot mono">
    <span class="wf-foot-dot" aria-hidden="true"></span>
    {{ diagram().footer }}
  </div>
</figure>
