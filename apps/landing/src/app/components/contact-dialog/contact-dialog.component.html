@if (contactDialog.isOpen()) {
  <div class="contact-dialog-backdrop" (click)="close()">
    <section
      class="contact-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="contact-dialog-title"
      (click)="$event.stopPropagation()"
    >
      <button
        type="button"
        class="contact-dialog-close"
        [attr.aria-label]="copy().closeLabel"
        (click)="close()"
      >
        <span aria-hidden="true">×</span>
      </button>

      <p class="eyebrow">{{ copy().eyebrow }}</p>
      <h2 id="contact-dialog-title">{{ copy().title }}</h2>
      <p class="contact-dialog-body">{{ copy().body }}</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="contact-form" novalidate>
        <label class="contact-field">
          <span class="contact-label mono">{{ copy().name }}</span>
          <input
            #nameInput
            type="text"
            class="contact-input"
            formControlName="name"
            autocomplete="name"
          />
        </label>

        <label class="contact-field">
          <span class="contact-label mono">{{ copy().email }}</span>
          <input
            type="email"
            class="contact-input"
            formControlName="email"
            [class.contact-input-error]="
              submitted() && form.get('email')?.invalid
            "
            autocomplete="email"
          />
        </label>

        <label class="contact-field">
          <span class="contact-label mono">{{ copy().phone }}</span>
          <input
            type="tel"
            class="contact-input"
            formControlName="phone"
            [class.contact-input-error]="
              submitted() && form.get('phone')?.invalid
            "
            autocomplete="tel"
          />
        </label>

        <label class="contact-field contact-field-full">
          <span class="contact-label mono">{{ copy().message }}</span>
          <textarea
            class="contact-input contact-textarea"
            formControlName="message"
            [class.contact-input-error]="
              submitted() && form.get('message')?.invalid
            "
            rows="6"
          ></textarea>
          <div class="contact-field-footer">
            <span class="contact-character-count"
              >{{ messageLength() }}/1000 {{ copy().messageHint }}</span
            >
          </div>
        </label>

        @if (errors().length > 0) {
          <div class="contact-errors contact-field-full" role="alert">
            <p class="contact-errors-title">{{ copy().errorSummary }}</p>
            <ul class="contact-errors-list">
              @for (error of errors(); track error) {
                <li>{{ error }}</li>
              }
            </ul>
          </div>
        }

        <div class="contact-actions contact-field-full">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="!canSubmit() || isSending()"
          >
            {{ isSending() ? copy().sending : copy().submit }}
          </button>
          <p class="contact-powered mono">{{ copy().poweredBy }}</p>
        </div>
      </form>
    </section>
  </div>
}
