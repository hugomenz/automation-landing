<section class="hero" aria-labelledby="hero-title">
  <div class="container hero-grid">
    <div class="hero-copy">
      <p class="eyebrow">{{ content().hero.kicker }}</p>
      <h1 id="hero-title">{{ content().hero.title }}</h1>
      <p class="hero-lead">{{ content().hero.body }}</p>

      <div class="hero-actions">
        <button type="button" class="btn btn-primary" (click)="contactDialog.open()">
          {{ content().hero.primaryCta }}
        </button>
        <a class="btn btn-secondary" href="#build">{{ content().hero.secondaryCta }}</a>
      </div>

      <p class="hero-tech mono">{{ content().hero.techLine }}</p>
    </div>

    <div class="hero-visual">
      <app-workflow-panel [diagram]="diagram()" />
    </div>
  </div>
</section>
