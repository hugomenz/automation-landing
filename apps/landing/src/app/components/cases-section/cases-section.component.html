<section class="section outcome" id="outcome" aria-labelledby="outcome-title">
  <div class="container outcome-grid">
    <div class="outcome-head">
      <p class="eyebrow">{{ content().eyebrow }}</p>
      <h2 id="outcome-title">{{ content().title }}</h2>
      <p class="outcome-highlight">{{ content().highlight }}</p>
    </div>

    <ul class="check-list">
      @for (point of content().points; track point) {
        <li class="check-item">
          <span class="check-icon" aria-hidden="true">
            <svg
              viewBox="0 0 20 20"
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m4 10 4 4 8-9" />
            </svg>
          </span>
          <span>{{ point }}</span>
        </li>
      }
    </ul>
  </div>
</section>
