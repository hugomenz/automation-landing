<section class="section trust" id="trust" aria-labelledby="trust-title">
  <div class="container">
    <header class="section-head">
      <p class="eyebrow">{{ content().eyebrow }}</p>
      <h2 id="trust-title">{{ content().title }}</h2>
    </header>

    <ul class="trust-list">
      @for (point of content().points; track point) {
        <li class="trust-item">
          <span class="trust-dot" aria-hidden="true"></span>
          <span>{{ point }}</span>
        </li>
      }
    </ul>
  </div>
</section>
