<a class="skip-link" href="#content">
  {{ language() === 'de' ? 'Zum Inhalt springen' : 'Skip to content' }}
</a>

<header class="site-header" [class.is-open]="menuOpen()">
  <div class="container header-inner">
    <a class="brand" [href]="copy().homePath" [attr.aria-label]="copy().brandLabel" (click)="closeMenu()">
      <span class="brand-mark" aria-hidden="true"><span class="brand-dot"></span></span>
      <span class="brand-copy">
        <strong>Hugo Menz Automation</strong>
        <span>{{ copy().subtitle }}</span>
      </span>
    </a>

    <button
      type="button"
      class="nav-toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="primary-nav"
      [attr.aria-label]="copy().menuLabel"
      (click)="toggleMenu()"
    >
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <div class="header-actions" id="primary-nav">
      <nav class="nav-links" [attr.aria-label]="copy().navigationLabel">
        @for (item of navigation(); track item.label) {
          <a
            [href]="item.path"
            [attr.lang]="item.lang ?? null"
            (click)="closeMenu()"
          >{{ item.label }}</a>
        }
      </nav>

      <div class="header-controls">
        <a
          class="language-link"
          [href]="languagePath()"
          [attr.aria-label]="copy().languageLabel"
          hreflang="{{ language() === 'de' ? 'en' : 'de-DE' }}"
          (click)="closeMenu()"
        >{{ copy().languageText }}</a>
        <a
          class="nav-cta"
          [href]="copy().ctaPath"
          data-cta="readiness-header"
          (click)="closeMenu()"
        >{{ copy().cta }}</a>
      </div>
    </div>
  </div>
</header>
